name: Feature request
description: Suggest a new engine, a new feature, or an improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. The most useful requests are concrete: a specific problem you want to solve, and ideally a sketch of how the API would look.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that metis can't do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the API look like? What would an example call look like?
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've tried or considered.

  - type: dropdown
    id: kind
    attributes:
      label: What kind of feature is this?
      options:
        - New engine
        - Improvement to existing engine
        - Router behavior
        - MCP server / Claude Code integration
        - Benchmark / system test
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contrib
    attributes:
      label: Are you willing to contribute?
      options:
        - label: I'd like to submit a PR for this myself
        - label: I can help test or review
